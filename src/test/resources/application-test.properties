# Test Configuration - Override production defaults
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Override SQL Server configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled in test)
spring.h2.console.enabled=false

# Disable Flyway during unit tests
spring.flyway.enabled=false

# Disable extra logging during tests
logging.level.root=WARN
logging.level.com.rajan=INFO
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# Disable Thymeleaf strict mode for tests
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# Server config for tests
server.port=0

# Disable health checks and actuator endpoints during tests
management.endpoints.web.exposure.include=health
