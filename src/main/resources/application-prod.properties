# Production SQL Server configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:proddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# When DB_URL is provided for SQL Server, Spring Boot will infer the driver from the URL.
# If no DB_URL is provided, embedded H2 is used in SQL Server compatibility mode for fallback/demo deployments.

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.h2.console.enabled=false
